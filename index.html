<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00C7BE">
  <title>Dashcam.io — Your phone is your dashcam</title>
  <meta name="description" content="Turn your phone into an AI dashcam. Drive. You're protected.">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #F2F2F7;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: #00C7BE;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo span {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #FFFFFF;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }
    .pitch {
      font-size: 17px;
      color: #3C3C43;
      margin: 0 0 32px;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      padding: 10px 18px;
      background: #F2F2F7;
      color: #8E8E93;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #E5E5EA;
    }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #8E8E93;
    }
    footer a { color: #00A89F; text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" aria-hidden="true"><span></span></div>
    <h1>Dashcam.io</h1>
    <p class="pitch">Turn your phone into an AI dashcam. Drive. You're protected.</p>
    <div class="badge">Coming soon to Google Play</div>
    <footer>&copy; 2026 Dashcam.io &middot; <a href="https://byteflowers.com">byteflowers</a></footer>
  </main>
</body>
</html>
